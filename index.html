<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz cumple Fran</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero" id="hero">
      <div class="intro" id="intro">
        <button class="reveal-button" id="revealButton" type="button">Pulsa acá</button>
      </div>

      <section class="message-card" id="messageCard" aria-live="polite">
        <p>
          Feliz cumpleaños Fran, te deseo lo mejor. Desde que te conozco me di
          cuenta que sos una persona maravillosa y muy buena onda. Quiero seguir
          conociéndote y seguir descubriendo la maravillosa persona que sos.
          Pasala muy bien en tu día.
        </p>
      </section>

      <section class="music-player" aria-label="Reproductor de música">
        <div class="track-info">
          <span class="track-label">Canción actual</span>
          <strong id="trackName">Cargando música...</strong>
        </div>

        <div class="player-controls" aria-label="Controles de reproducción">
          <button class="control-button" id="previousTrack" type="button" aria-label="Canción anterior">⏮</button>
          <button class="control-button play-button" id="playPause" type="button" aria-label="Reproducir o pausar">▶</button>
          <button class="control-button" id="nextTrack" type="button" aria-label="Siguiente canción">⏭</button>
        </div>


        <label class="volume-control" for="volumeControl">
          <span>Volumen</span>
          <input id="volumeControl" type="range" min="0" max="100" value="70" />
          <output id="volumeValue" for="volumeControl">70%</output>
        </label>
        <audio id="audioPlayer" preload="metadata"></audio>
      </section>

      <div class="petals" id="petals" aria-hidden="true"></div>

      <img src="ghostface.jpg" alt="Decoración" class="corner-image image-right" />
      <img src="lucy.png" alt="Lucy" class="corner-image image-left" />
    </main>

    <script src="script.js"></script>
  </body>
</html>

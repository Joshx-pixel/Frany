<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz cumple Fran</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero" id="hero">
      <div class="intro" id="intro">
        <button class="reveal-button" id="revealButton" type="button">Pulsa acá</button>
      </div>

      <section class="message-board" id="messageCard" aria-live="polite" aria-label="Mensaje de cumpleaños">
        <article class="message-box message-box-left" style="--delay: 0s; --rotation: -4deg;">
          Feliz cumpleaños Fran
        </article>
        <article class="message-box message-box-right" style="--delay: 1.5s; --rotation: 4deg;">
          te deseo lo mejor
        </article>
        <article class="message-box message-box-left" style="--delay: 3s; --rotation: -3deg;">
          Desde que te conozco me di cuenta que sos una persona maravillosa y muy buena onda
        </article>
        <article class="message-box message-box-right" style="--delay: 4.5s; --rotation: 3deg;">
          Quiero seguir conociéndote y seguir descubriendo la maravillosa persona que sos
        </article>
        <article class="message-box message-box-left" style="--delay: 6s; --rotation: -2deg;">
          Pasala muy bien en tu día que te lo mereces.
        </article>
      </section>

      <section class="music-player" aria-label="Reproductor de música">
        <div class="track-info">
          <span class="track-label">Canción actual</span>
          <strong id="trackName">Cargando música...</strong>
        </div>

        <div class="player-controls" aria-label="Controles de reproducción">
          <button class="control-button" id="previousTrack" type="button" aria-label="Canción anterior">⏮</button>
          <button class="control-button play-button" id="playPause" type="button" aria-label="Reproducir o pausar">▶</button>
          <button class="control-button" id="nextTrack" type="button" aria-label="Siguiente canción">⏭</button>
        </div>


        <label class="volume-control" for="volumeControl">
          <span>Volumen</span>
          <input id="volumeControl" type="range" min="0" max="100" value="20" />
          <output id="volumeValue" for="volumeControl">20%</output>
        </label>
        <audio id="audioPlayer" preload="metadata"></audio>
      </section>

      <div class="petals" id="petals" aria-hidden="true"></div>
      <div class="fireworks" id="fireworks" aria-hidden="true"></div>

      <img src="ghostface.jpg" alt="Decoración" class="corner-image image-right" />
      <img src="lucy.png" alt="Lucy" class="corner-image image-left" />
    </main>

    <script src="script.js"></script>
  </body>
</html>
